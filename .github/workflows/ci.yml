name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: |
          pip install numpy pandas pydantic click pytest pytest-cov ruff
          pip install -e .
      - run: ruff check src tests
      - run: pytest -v --cov=src tests/test_search.py tests/test_index.py
